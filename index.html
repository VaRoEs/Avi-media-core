<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AVI Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === БАЗОВЫЕ СТИЛИ === */
        body {
            background-color: #0f0f1a;
            color: #bbdefb;
            font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        
        h2 { 
            font-weight: 300; 
            letter-spacing: 2px; 
            margin-top: 20px; 
        }

        /* === КОНТЕЙНЕР ПЛЕЕРА === */
        #player-wrapper {
            position: relative;
            width: 100%;
            max-width: 1000px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            margin-top: 20px;
            user-select: none; 
            -webkit-user-select: none;
        }

        /* Само видео */
        video {
            width: 100%;
            height: 100%; 
            object-fit: contain; 
            display: block;
            cursor: pointer;
        }

        /* Гарантия правильного Fullscreen без сдвигов */
        #player-wrapper:fullscreen,
        #player-wrapper:-webkit-full-screen,
        #player-wrapper:-moz-full-screen {
            max-width: none !important;
            width: 100vw !important;
            height: 100vh !important;
            margin: 0 !important; 
            border-radius: 0 !important;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        /* Магия бездействия (прячем курсор) */
        #player-wrapper.idle, 
        #player-wrapper.idle video {
            cursor: none !important;
        }

        /* === КАСТОМНАЯ ПАНЕЛЬ УПРАВЛЕНИЯ === */
        #custom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 15, 26, 0.85);
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            gap: 15px;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 10;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        @supports (backdrop-filter: blur(10px)) {
            #custom-controls { backdrop-filter: blur(10px); }
        }

        #player-wrapper:hover #custom-controls {
            transform: translateY(0);
        }
        
        #player-wrapper.idle #custom-controls {
            transform: translateY(100%) !important;
        }
        
        #player-wrapper.paused #custom-controls {
            transform: translateY(0) !important;
        }

        /* Кнопки управления */
        .ctrl-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            outline: none;
            transition: color 0.2s;
            padding: 0;
            width: 30px;
        }
        .ctrl-btn:hover { color: #2196f3; }

        /* Прогресс-бар */
        #progress-container {
            flex-grow: 1;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        #progress-fill {
            position: absolute;
            top: 0; left: 0; height: 100%;
            background: #2196f3;
            border-radius: 3px;
            width: 0%;
            pointer-events: none;
            transition: width 0.2s linear;
        }
        
        /* Визуализация загруженного буфера (светлая полоска под основной) */
        #buffer-fill {
            position: absolute;
            top: 0; left: 0; height: 100%;
            background: rgba(255,255,255,0.4);
            border-radius: 3px;
            width: 0%;
            pointer-events: none;
            z-index: -1;
        }

        /* Таймер */
        #time-display {
            font-size: 13px;
            color: #ddd;
            min-width: 100px;
            text-align: center;
        }

        /* === ИНДИКАТОРЫ ДВОЙНОГО ТАПА === */
        .tap-indicator {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 24px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 25px;
            border-radius: 30px;
            opacity: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 5;
            border: 1px solid rgba(255,255,255,0.2);
        }
        @supports (backdrop-filter: blur(5px)) {
            .tap-indicator { backdrop-filter: blur(5px); }
        }

        .tap-indicator.left { left: 10%; }
        .tap-indicator.right { right: 10%; }

        .tap-indicator.pulse {
            animation: tapPulse 0.5s ease-out forwards;
        }
        @keyframes tapPulse {
            0% { transform: translateY(-50%) scale(0.8); opacity: 1; }
            100% { transform: translateY(-50%) scale(1.2); opacity: 0; }
        }

        /* Статусные сообщения */
        #status-msg { margin-top: 15px; color: #888; font-size: 14px; text-align: center; }
        .error { color: #f44336 !important; }
    </style>
</head>
<body>

    <h2><i class="fas fa-play-circle" style="color: #2196f3;"></i> AVI Player</h2>
    
    <div id="player-wrapper" class="paused">
        <video id="video"></video>
        
        <div id="tap-left" class="tap-indicator left"><i class="fas fa-backward"></i> 5 сек</div>
        <div id="tap-right" class="tap-indicator right">5 сек <i class="fas fa-forward"></i></div>
        
        <div id="custom-controls">
            <button id="play-pause-btn" class="ctrl-btn" title="Play/Pause (Space)">
                <i class="fas fa-play"></i>
            </button>
            
            <div id="progress-container">
                <div id="buffer-fill"></div>
                <div id="progress-fill"></div>
            </div>
            
            <div id="time-display">00:00 / 00:00</div>
            
            <button id="mute-btn" class="ctrl-btn" title="Mute (M)">
                <i class="fas fa-volume-up"></i>
            </button>
            
            <button id="fullscreen-btn" class="ctrl-btn" title="Fullscreen (F)">
                <i class="fas fa-expand"></i>
            </button>
        </div>
    </div>

    <div id="status-msg">Инициализация плеера...</div>

    <script>
        // === 1. УМНАЯ ЛОГИКА ЗАГРУЗКИ ПОТОКА (HLS) ===
        function getQueryParam(name) {
            var match = RegExp('[?&]' + name + '=([^&]*)').exec(window.location.search);
            return match && decodeURIComponent(match[1].replace(/\+/g, ' '));
        }

        var streamUrl = getQueryParam('stream');
        var video = document.getElementById('video');
        var statusMsg = document.getElementById('status-msg');

        if (!streamUrl) {
            statusMsg.className = 'error';
            statusMsg.innerHTML = 'URL потока не найден. Запустите видео с главного сервера.';
        } else {
            if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                
                // --- ГЛАВНАЯ МАГИЯ АГРЕССИВНОГО КЭША (200 МБ) ---
                var hls = new Hls({ 
                    debug: false,
                    maxBufferSize: 200 * 1024 * 1024, // Жесткий лимит ОЗУ в 200 МБ
                    maxBufferLength: 120,             // Стараться качать минимум на 2 минуты вперед
                    maxMaxBufferLength: 900,          // Максимальный буфер до 15 минут (если влезает в 200 МБ)
                    maxBufferHole: 0.5                // Прощаем мелкие разрывы
                });
                // ------------------------------------------------
                
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    statusMsg.innerHTML = 'Поток готов! Нажмите Play.';
                });

                // АВТОВОССТАНОВЛЕНИЕ ПРИ ОШИБКАХ
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                console.log("Сетевая ошибка. Пробуем восстановить...");
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                console.log("Ошибка декодера. Перезапуск движка...");
                                hls.recoverMediaError(); 
                                break;
                            default:
                                hls.destroy(); 
                                break;
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                statusMsg.innerHTML = 'Поток готов (Нативный HLS).';
            } else {
                statusMsg.className = 'error';
                statusMsg.innerHTML = 'Ваш браузер слишком стар для стриминга (Нет поддержки MSE).';
            }
        }

        // === 1.1 СТОРОЖЕВОЙ ПЕС (Анти-зависание) ===
        var lastCurrentTime = -1;
        setInterval(function() {
            if (!video.paused && video.readyState >= 3) {
                if (video.currentTime === lastCurrentTime) {
                    console.log("Обнаружено мертвое зависание! Даем пинок...");
                    video.currentTime += 0.1; 
                }
                lastCurrentTime = video.currentTime;
            }
        }, 1500);

        // === 2. ЭЛЕМЕНТЫ ИНТЕРФЕЙСА ===
        var wrapper = document.getElementById('player-wrapper');
        var playBtn = document.getElementById('play-pause-btn');
        var muteBtn = document.getElementById('mute-btn');
        var fullBtn = document.getElementById('fullscreen-btn');
        var progressContainer = document.getElementById('progress-container');
        var progressFill = document.getElementById('progress-fill');
        var bufferFill = document.getElementById('buffer-fill'); // Новая полоска буфера
        var timeDisplay = document.getElementById('time-display');
        var tapLeftInd = document.getElementById('tap-left');
        var tapRightInd = document.getElementById('tap-right');

        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00";
            var m = Math.floor(seconds / 60);
            var s = Math.floor(seconds % 60);
            return (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
        }

        // === 3. БАЗОВЫЕ ФУНКЦИИ УПРАВЛЕНИЯ ===
        function togglePlay() {
            if (video.paused) {
                video.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                wrapper.classList.remove('paused');
            } else {
                video.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                wrapper.classList.add('paused');
            }
        }

        function toggleMute() {
            video.muted = !video.muted;
            muteBtn.innerHTML = video.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement && !document.mozFullScreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
                if (wrapper.requestFullscreen) wrapper.requestFullscreen();
                else if (wrapper.msRequestFullscreen) wrapper.msRequestFullscreen();
                else if (wrapper.mozRequestFullScreen) wrapper.mozRequestFullScreen();
                else if (wrapper.webkitRequestFullscreen) wrapper.webkitRequestFullscreen(Element.ALLOW_KEYBOARD_INPUT);
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.msExitFullscreen) document.msExitFullscreen();
                else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        }

        function scrub(e) {
            var rect = progressContainer.getBoundingClientRect();
            var pos = (e.clientX - rect.left) / rect.width;
            video.currentTime = pos * video.duration;
        }

        // Обновление полосок времени и скачанного буфера
        video.addEventListener('timeupdate', function() {
            if (!video.duration) return;
            
            // Движение основной полоски
            var percent = (video.currentTime / video.duration) * 100;
            progressFill.style.width = percent + '%';
            timeDisplay.innerText = formatTime(video.currentTime) + " / " + formatTime(video.duration);

            // Отрисовка серой полоски загруженного буфера (теперь ты увидишь эти 200 МБ в деле!)
            if (video.buffered.length > 0) {
                var bufferedEnd = video.buffered.end(video.buffered.length - 1);
                var bufferPercent = (bufferedEnd / video.duration) * 100;
                bufferFill.style.width = bufferPercent + '%';
            }
        });

        playBtn.addEventListener('click', togglePlay);
        muteBtn.addEventListener('click', toggleMute);
        fullBtn.addEventListener('click', toggleFullscreen);
        progressContainer.addEventListener('click', scrub);

        // === 4. УМНАЯ ЛОГИКА ТАПОВ ПО ЭКРАНУ ===
        var clickTimer = null;

        function showTapAnimation(element) {
            element.classList.remove('pulse');
            void element.offsetWidth;
            element.classList.add('pulse');
        }

        wrapper.addEventListener('click', function(e) {
            if (e.target.closest('#custom-controls')) return;

            var rect = wrapper.getBoundingClientRect();
            var clickX = e.clientX - rect.left;
            var isLeftSide = clickX < (rect.width / 2);

            if (clickTimer === null) {
                clickTimer = setTimeout(function() {
                    togglePlay();
                    clickTimer = null;
                }, 250);
            } else {
                clearTimeout(clickTimer);
                clickTimer = null;

                if (isLeftSide) {
                    video.currentTime -= 5;
                    showTapAnimation(tapLeftInd);
                } else {
                    video.currentTime += 5;
                    showTapAnimation(tapRightInd);
                }
            }
        });

        // === 5. ГОРЯЧИЕ КЛАВИШИ ===
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            switch(e.keyCode) {
                case 32: 
                    e.preventDefault();
                    togglePlay();
                    break;
                case 39: 
                    video.currentTime += 5;
                    showTapAnimation(tapRightInd);
                    break;
                case 37: 
                    video.currentTime -= 5;
                    showTapAnimation(tapLeftInd);
                    break;
                case 70: 
                    toggleFullscreen();
                    break;
                case 77: 
                    toggleMute();
                    break;
            }
        });

        // === 6. АВТОСКРЫТИЕ ПАНЕЛИ И КУРСОРА ===
        var hideControlsTimer = null;

        function resetActivityTimer() {
            wrapper.classList.remove('idle');
            clearTimeout(hideControlsTimer);
            
            if (!video.paused) {
                hideControlsTimer = setTimeout(function() {
                    wrapper.classList.add('idle');
                }, 2500); 
            }
        }

        wrapper.addEventListener('mousemove', resetActivityTimer);
        wrapper.addEventListener('click', resetActivityTimer);
        document.addEventListener('keydown', resetActivityTimer);
        
        wrapper.addEventListener('mouseleave', function() {
            if (!video.paused) wrapper.classList.add('idle');
        });

        video.addEventListener('play', resetActivityTimer);
        video.addEventListener('pause', function() {
            clearTimeout(hideControlsTimer);
            wrapper.classList.remove('idle');
        });
    </script>

</body>
</html>
